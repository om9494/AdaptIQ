databases:
  - name: adaptiq-db
    plan: free
    databaseName: adaptiq_db
    user: adaptiq_user

services:
  - type: web
    name: adaptiq-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python seed_fresh_database.py && gunicorn wsgi:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: adaptiq-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: UPLOAD_FOLDER
        value: /opt/render/project/src/backend/uploads
      - key: MAX_CONTENT_LENGTH
        value: "104857600"
